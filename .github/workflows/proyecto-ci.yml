name: Build and Test Docker Image

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        run: |
          docker build -t mi-proyecto-docker:latest .

      - name: Test Docker container
        run: |
          # Corre el contenedor en segundo plano
          docker run -d --name test-container -p 8080:80 mi-proyecto-docker:latest
          sleep 5  # espera a que arranque
          # Verifica que la página principal responde con HTTP 200
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" http://localhost:8080)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" -ne 200 ]; then
            echo "Test failed: Index page not reachable"
            exit 1
          fi
          # Detener y eliminar contenedor de prueba
          docker stop test-container
          docker rm test-container